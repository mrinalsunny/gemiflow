# GemiFlow v3.5 — Docker Compose Profiles
#
# Profiles:
#   lite     — MCP server only (stdio), minimal footprint
#   full     — CLI + daemon + all optional deps
#   workers  — Scalable worker pool (extends docker-compose.workers.yml)
#
# Usage:
#   docker compose -f v3/@gemiflow/cli/docker/docker-compose.yml --profile lite up
#   docker compose -f v3/@gemiflow/cli/docker/docker-compose.yml --profile full up -d
#   docker compose -f v3/@gemiflow/cli/docker/docker-compose.yml --profile workers up -d --scale worker=5
#
# Environment (required for full/workers):
#   google_API_KEY — Your google API key

services:
  # ── lite: MCP server on stdio (~80MB) ──────────────────────────
  mcp:
    profiles: ["lite"]
    build:
      context: ../../../..
      dockerfile: v3/@gemiflow/cli/docker/Dockerfile
    image: gemiflow:lite
    stdin_open: true
    environment:
      - NODE_ENV=production
      - GEMIFLOW_MCP_TRANSPORT=stdio
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
    healthcheck:
      test: ["CMD", "gemiflow", "doctor", "--quiet"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ── full: CLI + daemon + optional deps (~800MB) ────────────────
  gemiflow-full:
    profiles: ["full"]
    build:
      context: ../../../..
      dockerfile: v3/@gemiflow/cli/docker/Dockerfile.full
    image: gemiflow:full
    environment:
      - google_API_KEY=${google_API_KEY}
      - NODE_ENV=production
      - GEMIFLOW_LOG_LEVEL=${GEMIFLOW_LOG_LEVEL:-info}
      - GEMIFLOW_MEMORY_BACKEND=hybrid
    volumes:
      - gemiflow-state:/home/gemiflow/.gemiflow
      - gemiflow-logs:/var/log/gemiflow
    ports:
      - "${GEMIFLOW_MCP_PORT:-3000}:3000"
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 8G
        reservations:
          cpus: "1"
          memory: 2G
    command: ["gemiflow", "daemon", "start", "--foreground"]
    healthcheck:
      test: ["CMD", "gemiflow", "doctor", "--quiet"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── workers: Scalable worker pool ──────────────────────────────
  worker:
    profiles: ["workers"]
    build:
      context: ../../../..
      dockerfile: v3/@gemiflow/cli/docker/Dockerfile
    image: gemiflow:lite
    environment:
      - google_API_KEY=${google_API_KEY}
      - CLAUDE_CODE_HEADLESS=true
      - CLAUDE_CODE_SANDBOX_MODE=${GEMIFLOW_SANDBOX:-strict}
      - GEMIFLOW_WORKERS=${GEMIFLOW_WORKERS:-audit,optimize,testgaps}
      - NODE_ENV=production
    volumes:
      - worker-state:/home/gemiflow/.gemiflow
      - worker-logs:/var/log/gemiflow
    deploy:
      replicas: ${GEMIFLOW_WORKER_REPLICAS:-3}
      resources:
        limits:
          cpus: "2"
          memory: 4G
        reservations:
          cpus: "0.5"
          memory: 1G
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
    command: ["gemiflow", "daemon", "start", "--foreground", "--headless"]
    healthcheck:
      test: ["CMD", "gemiflow", "doctor", "--quiet"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  gemiflow-state:
  gemiflow-logs:
  worker-state:
  worker-logs:
